// ---------- styles ----------
const CSS = `
.ef-root{--bg:#0f0f0f;--surface:#1b1b1b;--surface2:#242424;--red:#e50914;--text:#f3f3f3;--muted:#9aa0a6;--border:#2c2c2c;
  background:var(--bg);color:var(--text);min-height:100vh;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.ef-root *{box-sizing:border-box;}
.ef-root button{font-family:inherit;cursor:pointer;}

.ef-nav{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 4vw;background:linear-gradient(180deg,rgba(0,0,0,0.92),rgba(0,0,0,0.55) 75%,rgba(0,0,0,0));backdrop-filter:blur(2px);}
.ef-brand{font-weight:800;font-size:24px;letter-spacing:-0.5px;color:var(--red);text-transform:uppercase;}
.ef-brand span{color:#fff;}
.ef-empty .ef-empty-mark span{color:#fff;}
.ef-nav-right{display:flex;align-items:center;gap:12px;}
.ef-search{display:flex;align-items:center;gap:8px;background:rgba(20,20,20,0.85);border:1px solid var(--border);
  border-radius:4px;padding:8px 11px;color:var(--muted);transition:border .2s;}
.ef-search:focus-within{border-color:#555;}
.ef-search input{background:none;border:none;outline:none;color:var(--text);width:180px;font-size:13px;}
.ef-search button{background:none;border:none;color:var(--muted);display:flex;padding:0;}
.ef-add{display:flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:none;border-radius:4px;
  padding:9px 15px;font-weight:700;font-size:13px;transition:filter .15s,transform .1s;}
.ef-add:hover{filter:brightness(1.12);} .ef-add:active{transform:scale(.97);}

.ef-loading{padding:120px 4vw;color:var(--muted);font-size:15px;}

.ef-empty{max-width:560px;margin:9vh auto;padding:0 6vw;text-align:center;}
.ef-empty-mark{font-weight:800;font-size:32px;color:var(--red);text-transform:uppercase;letter-spacing:-1px;margin-bottom:26px;}
.ef-empty h2{font-size:26px;margin:0 0 10px;font-weight:700;}
.ef-empty p{color:var(--muted);line-height:1.6;margin:0 0 26px;font-size:15px;}

.ef-hero{position:relative;margin-top:-72px;min-height:clamp(420px,62vh,560px);display:flex;align-items:flex-end;
  background-size:cover;background-position:center top;}
.ef-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,var(--bg));pointer-events:none;}
.ef-hero-inner{position:relative;z-index:2;padding:0 4vw 52px;max-width:680px;}
.ef-hero-eyebrow{display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;font-size:12px;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:14px;}
.ef-hero-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);}
.ef-hero-title{font-size:clamp(34px,6vw,62px);line-height:1.02;margin:0 0 16px;font-weight:800;letter-spacing:-1px;
  text-shadow:0 2px 24px rgba(0,0,0,.6);}
.ef-hero-meta{display:flex;flex-wrap:wrap;align-items:center;gap:14px;color:#d4d4d4;font-size:14px;margin-bottom:18px;}
.ef-match{color:#46d369;font-weight:700;}
.ef-hero-progress{display:flex;align-items:center;gap:12px;margin-bottom:22px;max-width:420px;}
.ef-hero-bar{flex:1;height:5px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden;}
.ef-hero-bar span{display:block;height:100%;background:var(--red);}
.ef-hero-progtext{color:var(--muted);font-size:12px;white-space:nowrap;}
.ef-hero-actions{display:flex;gap:12px;flex-wrap:wrap;}

.ef-btn-primary{display:inline-flex;align-items:center;gap:9px;background:var(--red);color:#fff;border:none;
  border-radius:5px;padding:12px 22px;font-weight:700;font-size:15px;transition:filter .15s,transform .1s;}
.ef-btn-primary:hover{filter:brightness(1.12);} .ef-btn-primary:active{transform:scale(.98);}
.ef-btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.ef-btn-ghost{display:inline-flex;align-items:center;gap:8px;background:rgba(120,120,120,.32);color:#fff;border:none;
  border-radius:5px;padding:12px 20px;font-weight:600;font-size:14px;transition:background .15s;}
.ef-btn-ghost:hover{background:rgba(120,120,120,.5);}
.ef-btn-danger{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;border-radius:5px;
  padding:11px 18px;font-weight:700;font-size:14px;}
.ef-btn-danger:hover{filter:brightness(1.12);}

.ef-statstrip{display:flex;gap:10px;flex-wrap:wrap;padding:6px 4vw 4px;}
.ef-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 20px;min-width:110px;flex:1;}
.ef-stat-n{font-size:26px;font-weight:800;display:flex;align-items:center;gap:5px;}
.ef-stat-star{color:#f5c518;}
.ef-stat-l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

.ef-rows{padding:18px 0 40px;}
.ef-rowsection{margin-bottom:30px;}
.ef-rowtitle{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700;margin:0 0 14px;padding:0 4vw;}
.ef-rowdot{width:9px;height:9px;border-radius:2px;}
.ef-rowcount{color:var(--muted);font-size:12px;font-weight:600;background:var(--surface2);padding:1px 8px;border-radius:10px;}
.ef-rowchev{color:var(--muted);}
.ef-rowscroll{display:flex;gap:14px;overflow-x:auto;padding:6px 4vw 14px;scroll-snap-type:x proximity;}
.ef-rowscroll::-webkit-scrollbar{height:8px;}
.ef-rowscroll::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:4px;}
.ef-rowscroll::-webkit-scrollbar-track{background:transparent;}

.ef-card{flex:0 0 168px;width:168px;scroll-snap-align:start;}
.ef-card-art{position:relative;border-radius:6px;overflow:hidden;transition:transform .22s ease;background:var(--surface);}
.ef-card:hover .ef-card-art{transform:scale(1.045);box-shadow:0 12px 30px rgba(0,0,0,.6);}
.ef-poster{position:relative;width:100%;aspect-ratio:2/3;background:var(--surface2);}
.ef-poster-img{width:100%;height:100%;object-fit:cover;display:block;}
.ef-poster-fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;text-align:center;}
.ef-poster-initials{font-size:40px;font-weight:800;color:rgba(255,255,255,.92);}
.ef-poster-fbtitle{font-size:12px;color:rgba(255,255,255,.82);line-height:1.25;}
.ef-badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:700;color:#fff;padding:3px 8px;border-radius:3px;
  text-transform:uppercase;letter-spacing:.5px;box-shadow:0 2px 6px rgba(0,0,0,.4);}
.ef-card-hover{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;
  padding:8px;opacity:0;background:linear-gradient(180deg,rgba(0,0,0,.45),transparent 40%,rgba(0,0,0,.55));transition:opacity .2s;}
.ef-card:hover .ef-card-hover{opacity:1;}
.ef-card-hover-row{display:flex;gap:6px;}
.ef-iconbtn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:none;
  background:rgba(20,20,20,.85);color:#fff;border:1px solid rgba(255,255,255,.35);}
.ef-iconbtn:hover{background:#fff;color:#111;}
.ef-bump-big{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--red);color:#fff;
  border:none;border-radius:4px;padding:9px;font-weight:700;font-size:12px;}
.ef-bump-big:hover{filter:brightness(1.12);}
.ef-card-progress{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(0,0,0,.55);}
.ef-card-progress span{display:block;height:100%;background:var(--red);}

.ef-card-meta{padding:9px 2px 0;}
.ef-card-title{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ef-card-sub{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px;}
.ef-card-ep{display:flex;align-items:center;gap:4px;color:var(--muted);font-size:11.5px;font-weight:600;}
.ef-quickrow{display:flex;gap:6px;margin-top:8px;}
.ef-bump{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;background:var(--red);color:#fff;border:none;
  border-radius:4px;padding:7px;font-weight:700;font-size:12px;transition:filter .15s,transform .1s;}
.ef-bump:hover{filter:brightness(1.13);} .ef-bump:active{transform:scale(.95);}
.ef-bump-minus{display:flex;align-items:center;justify-content:center;width:34px;background:var(--surface2);color:var(--muted);
  border:1px solid var(--border);border-radius:4px;}
.ef-bump-minus:hover{color:#fff;border-color:#555;}

.ef-stars{display:inline-flex;align-items:center;}
.ef-star-wrap{position:relative;display:inline-block;}
.ef-star-bg{color:#4a4a4a;position:absolute;inset:0;}
.ef-star-fillclip{position:absolute;inset:0;overflow:hidden;display:block;}
.ef-star-fg{color:#f5c518;}
.ef-star-hit{position:absolute;top:0;bottom:0;background:none;border:none;padding:0;z-index:3;}

.ef-noresults,.ef-rows .ef-noresults{color:var(--muted);padding:30px 4vw;}

.ef-footer{color:#5a5a5a;font-size:12px;text-align:center;padding:26px 4vw 40px;border-top:1px solid var(--border);}

.ef-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-start;justify-content:center;
  padding:5vh 16px;z-index:60;overflow-y:auto;backdrop-filter:blur(3px);}
.ef-modal{background:#161616;border:1px solid var(--border);border-radius:10px;width:100%;max-width:480px;padding:26px;position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,.7);}
.ef-modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);display:flex;}
.ef-modal-close:hover{color:#fff;}
.ef-modal-h{font-size:21px;font-weight:700;margin:0 0 20px;}
.ef-field{display:flex;flex-direction:column;gap:6px;margin-bottom:15px;}
.ef-field>span{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.ef-field>span em{text-transform:none;letter-spacing:0;font-style:normal;opacity:.7;}
.ef-field input,.ef-field select,.ef-field textarea{background:var(--surface);border:1px solid var(--border);border-radius:5px;
  padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border .15s;font-family:inherit;}
.ef-field input:focus,.ef-field select:focus,.ef-field textarea:focus{border-color:var(--red);}
.ef-field textarea{resize:vertical;}
.ef-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.ef-typetoggle{display:flex;gap:8px;margin-bottom:15px;}
.ef-toggle{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);border-radius:5px;padding:9px;font-weight:600;font-size:13px;}
.ef-toggle.on{background:var(--red);border-color:var(--red);color:#fff;}
.ef-rate-row{display:flex;align-items:center;gap:14px;}
.ef-clearrate{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;}
.ef-clearrate:hover{color:#fff;}
.ef-modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}

.ef-confirm{background:#161616;border:1px solid var(--border);border-radius:10px;width:100%;max-width:380px;padding:24px;}
.ef-confirm h3{margin:0 0 8px;font-size:18px;}
.ef-confirm p{color:var(--muted);margin:0 0 20px;font-size:14px;}

.ef-flash{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#1f1f1f;border:1px solid var(--red);
  color:#fff;padding:12px 20px;border-radius:8px;display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;z-index:70;
  box-shadow:0 12px 36px rgba(0,0,0,.6);animation:efpop .25s ease;}
@keyframes efpop{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}

@media(max-width:620px){
  .ef-search input{width:110px;}
  .ef-hero-title{font-size:32px;}
  .ef-card{flex-basis:140px;width:140px;}
  .ef-brand{font-size:20px;}
}
/* --- intro splash (Netflix-style reveal) --- */
.ef-intro{position:fixed;inset:0;z-index:200;background:#000;display:flex;align-items:center;justify-content:center;
  cursor:pointer;animation:efIntroOut .7s ease 1.5s forwards;}
.ef-intro-word{font-weight:800;font-size:clamp(34px,9vw,84px);letter-spacing:-2px;text-transform:uppercase;color:var(--red);
  text-shadow:0 0 0 rgba(229,9,20,0);animation:efIntroWord 1.6s cubic-bezier(.2,.7,.2,1) forwards;}
.ef-intro-word span{color:#fff;}
@keyframes efIntroWord{
  0%{opacity:0;transform:scale(.72);filter:blur(6px);text-shadow:0 0 0 rgba(229,9,20,0);}
  45%{opacity:1;transform:scale(1.04);filter:blur(0);text-shadow:0 0 48px rgba(229,9,20,.75);}
  70%{transform:scale(1);text-shadow:0 0 26px rgba(229,9,20,.5);}
  100%{opacity:1;transform:scale(1.01);text-shadow:0 0 14px rgba(229,9,20,.3);}
}
@keyframes efIntroOut{to{opacity:0;visibility:hidden;}}

/* --- staggered card reveal --- */
.ef-reveal{animation:efReveal .55s cubic-bezier(.2,.7,.2,1) both;}
@keyframes efReveal{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* --- cinematic hero --- */
.ef-hero{animation:efKen 26s ease-out both;}
